- title: Coordinated Formation Sensing (CADRE)
  subtitle: Multi-agent lunar autonomy · NASA JPL
  group: featured
  link: https://aerospaceroboticslab.ae.gatech.edu/research/
  description: CADRE demonstrates multi-agent autonomy on a team of three rovers and a base station that autonomously explore the lunar surface and perform a distributed measurement with a multi-static ground-penetrating radar.
  tags:
    - multi-agent
    - lunar

- title: Multi-Modal Mobility (EELS)
  subtitle: Snake-like robot for icy moons · NASA JPL
  group: featured
  link: https://aerospaceroboticslab.ae.gatech.edu/research/
  description: We contribute dynamics modeling and resilient autonomy for EELS, a snake-like robot designed to navigate Enceladus' extreme surface and descend erupting vents to sample subsurface ocean water.
  tags:
    - mobility
    - lunar

- title: Learning Introspective Control (LINC)
  subtitle: Introspective neural control · DARPA
  group: featured
  link: https://aerospaceroboticslab.ae.gatech.edu/research/
  description: Machine-learning-based introspection enabling physical systems — ground vehicles, ships, drone swarms, robots — to respond to events not predicted at design time, updating control laws in real time.
  tags:
    - control

- title: Collaborative On-Orbit Inspection
  subtitle: Information-based guidance & control
  group: featured
  link: https://aerospaceroboticslab.ae.gatech.edu/research/
  description: Inspection and mapping of a target spacecraft using multiple observer spacecraft on passive relative orbits, with an information-gain approach that trades off gathered data against fuel and energy cost.
  tags:
    - on-orbit
    - multi-agent

- title: Chance-Constrained Trajectory Optimization
  subtitle: gPC-SCP for motion planning under uncertainty
  group: featured
  link: https://doi.org/10.1109/TRO.2022.3197072
  description: Generalized polynomial chaos-based sequential convex programming (gPC-SCP) computes solutions to continuous-time chance-constrained stochastic nonlinear optimal control problems, enabling safe motion planning under uncertainty.
  tags:
    - control

- title: GT Planetary Robotics Facility
  subtitle: A lunar analog testbed for autonomous exploration
  group: featured
  link: https://aerospaceroboticslab.ae.gatech.edu/gt-space-robots-testing-facility/
  description: A one-of-a-kind university lunar analog testbed — seven tons of basalt regolith and lighting that mimics the harsh glare of the Moon — for developing and testing autonomous rovers and robots.
  tags:
    - lunar
