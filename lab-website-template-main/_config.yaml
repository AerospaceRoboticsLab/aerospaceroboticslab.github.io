# site properties and page defaults
title: Aerospace Robotics Lab
subtitle: Georgia Tech
description: The Aerospace Robotics Lab at Georgia Tech develops autonomy for space systems, robotics, and nonlinear control in uncertain and extreme environments — on the Moon, in orbit, and beyond.
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
  orcid: 0000-0001-7897-3644
  google-scholar: Bo3Uu-gAAAAJ
  linkedin: nakka
  youtube: "@AerospaceRoboticsLab"
  website: https://aerospaceroboticslab.ae.gatech.edu

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff

# configure jekyll spaceship
jekyll-spaceship:
  mathjax-processor:
    src:
      - https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js
